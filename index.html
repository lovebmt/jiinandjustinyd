<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bài luận Markdown</title>
  <style>
    :root {
      --paper: #fffdf7;
      --page: #eef2ed;
      --ink: #17211b;
      --muted: #65706a;
      --green: #245c3d;
      --green-soft: #dfece2;
      --ochre: #b8872e;
      --blue: #315c7a;
      --rule: #d8d1c4;
      --shadow: rgba(23, 33, 27, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(36, 92, 61, 0.07) 1px, transparent 1px),
        linear-gradient(180deg, rgba(36, 92, 61, 0.05) 1px, transparent 1px),
        var(--page);
      background-size: 32px 32px;
      color: var(--ink);
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
    }

    .shell {
      width: min(980px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
      color: var(--muted);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      border: 2px solid var(--green);
      display: grid;
      place-items: center;
      color: var(--green);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      font-weight: 700;
      background: rgba(255, 253, 247, 0.78);
    }

    .brand strong {
      display: block;
      color: var(--ink);
      font-size: 15px;
      letter-spacing: 0.02em;
    }

    .brand span {
      display: none;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action {
      appearance: none;
      border: 1px solid rgba(36, 92, 61, 0.28);
      background: rgba(255, 253, 247, 0.86);
      color: var(--green);
      min-height: 38px;
      padding: 0 13px;
      font: inherit;
      font-size: 13px;
      font-weight: 650;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .action:hover {
      background: var(--green-soft);
    }

    .action:focus-visible {
      outline: 3px solid rgba(184, 135, 46, 0.38);
      outline-offset: 2px;
    }

    .stage {
      display: block;
    }

    .paper {
      width: min(210mm, 100%);
      min-height: 297mm;
      margin: 0 auto;
      padding: 28mm 24mm 24mm;
      background: var(--paper);
      border: 1px solid var(--rule);
      box-shadow: 0 22px 80px var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .paper::before {
      content: "";
      position: absolute;
      inset: 13mm;
      border: 1px solid rgba(36, 92, 61, 0.36);
      pointer-events: none;
    }

    .paper::after {
      content: "";
      position: absolute;
      top: 17mm;
      left: 50%;
      width: 54mm;
      height: 3px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, var(--ochre), transparent);
      pointer-events: none;
    }

    .cover {
      min-height: calc(297mm - 52mm);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .cover h1 {
      margin: 38mm 0 0;
      max-width: 150mm;
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.16;
      letter-spacing: 0;
      color: var(--green);
      text-transform: uppercase;
    }

    .cover h2 {
      margin: 16px 0 28px;
      font-size: 16px;
      line-height: 1.45;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .cover p {
      margin: 7px 0;
      max-width: 136mm;
      font-size: 15px;
      line-height: 1.65;
    }

    .cover strong {
      font-weight: 750;
      color: var(--ink);
    }

    .cover ul {
      width: min(136mm, 100%);
      margin: 18px auto;
      padding: 18px 24px;
      border-left: 4px solid var(--green);
      background: rgba(223, 236, 226, 0.55);
      text-align: left;
    }

    .cover li {
      margin: 8px 0;
      line-height: 1.55;
      font-size: 14.5px;
    }

    .cover hr {
      width: 92mm;
      border: 0;
      border-top: 1px solid var(--rule);
      margin: 24px auto;
    }

    .cover > p:last-child {
      margin-top: auto;
      padding-top: 28px;
      font-weight: 700;
      color: var(--green);
    }

    .document {
      position: relative;
      z-index: 1;
      text-align: left;
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
      color: var(--ink);
    }

    .document h1,
    .document h2,
    .document h3,
    .document h4 {
      letter-spacing: 0;
      color: var(--green);
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
      page-break-after: avoid;
    }

    .document h1 {
      margin: 0 0 18px;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(36, 92, 61, 0.28);
      font-size: clamp(27px, 4vw, 40px);
      line-height: 1.18;
      text-align: center;
      text-transform: uppercase;
    }

    .document h2 {
      margin: 32px 0 12px;
      font-size: 24px;
      line-height: 1.25;
    }

    .document h3 {
      margin: 26px 0 10px;
      font-size: 19px;
      line-height: 1.35;
      color: var(--blue);
    }

    .document h4 {
      margin: 20px 0 8px;
      font-size: 16px;
      line-height: 1.35;
    }

    .document p {
      margin: 10px 0;
      font-size: 16.5px;
      line-height: 1.78;
    }

    .document ul {
      margin: 10px 0 16px;
      padding-left: 26px;
    }

    .document li {
      margin: 7px 0;
      font-size: 16px;
      line-height: 1.68;
    }

    .document hr {
      width: 100%;
      border: 0;
      border-top: 1px solid var(--rule);
      margin: 24px 0;
    }

    .document blockquote {
      margin: 18px 0;
      padding: 12px 16px;
      border-left: 4px solid var(--ochre);
      background: rgba(223, 236, 226, 0.45);
      color: var(--muted);
    }

    .document figure {
      margin: 24px auto;
      padding: 12px;
      border: 1px solid rgba(36, 92, 61, 0.18);
      background: #ffffff;
      page-break-inside: avoid;
    }

    .document figure img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }

    .document figcaption {
      margin-top: 8px;
      text-align: center;
      color: var(--muted);
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
      font-size: 12.5px;
      line-height: 1.45;
    }

    .document a {
      color: var(--blue);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .document .table-wrap {
      width: 100%;
      overflow-x: auto;
      margin: 18px 0 24px;
      border: 1px solid rgba(36, 92, 61, 0.20);
      background: #ffffff;
    }

    .document table {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    .document th,
    .document td {
      border: 1px solid rgba(36, 92, 61, 0.18);
      padding: 9px 10px;
      vertical-align: top;
      text-align: left;
    }

    .document th {
      background: var(--green-soft);
      color: var(--green);
      font-weight: 750;
    }

    .document tbody tr:nth-child(even) {
      background: rgba(223, 236, 226, 0.22);
    }

    .error {
      border: 1px solid #c65f4b;
      background: #fff0ec;
      color: #7d2618;
      padding: 18px;
      line-height: 1.5;
      text-align: left;
    }

    @media (max-width: 920px) {
      .paper {
        padding: 24mm 13mm 18mm;
        min-height: auto;
      }

      .paper::before {
        inset: 8mm;
      }

      .cover h1 {
        margin-top: 22mm;
      }
    }

    @media print {
      body {
        background: white;
      }

      .shell {
        width: auto;
        padding: 0;
      }

      .topbar,
      .actions {
        display: none;
      }

      .stage {
        display: block;
      }

      .paper {
        width: 210mm;
        min-height: 297mm;
        box-shadow: none;
        border: 0;
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark">MD</div>
        <div>
          <strong>Bài luận Markdown</strong>
        </div>
      </div>
      <nav class="actions" aria-label="Thao tác">
        <a class="action" id="openMarkdown" href="luan_van_full.md">Mở Markdown</a>
        <button class="action" id="reloadButton" type="button">Tải lại</button>
        <button class="action" type="button" onclick="window.print()">In</button>
      </nav>
    </header>

    <section class="stage">
      <article class="paper">
        <div class="document" id="content" aria-live="polite"></div>
      </article>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const markdownFile = params.get("file") || "luan_van_full.md";
    const content = document.getElementById("content");
    const openMarkdown = document.getElementById("openMarkdown");
    const reloadButton = document.getElementById("reloadButton");

    openMarkdown.href = markdownFile;

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("'", "&#39;");
    }

    function inlineMarkdown(value) {
      return escapeHtml(value)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\*([^*]+)\*/g, "<em>$1</em>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    }

    function flushParagraph(buffer, html) {
      if (!buffer.length) return;
      html.push(`<p>${buffer.map((line) => inlineMarkdown(line)).join("<br>")}</p>`);
      buffer.length = 0;
    }

    function isTableRow(line) {
      return line.includes("|") && !isTableSeparator(line);
    }

    function isTableSeparator(line) {
      const cells = splitTableRow(line);
      return cells.length > 1 && cells.every((cell) => /^:?-{3,}:?$/.test(cell.trim()));
    }

    function splitTableRow(line) {
      return line
        .replace(/^\s*\|/, "")
        .replace(/\|\s*$/, "")
        .split("|")
        .map((cell) => cell.trim());
    }

    function renderTable(headerLine, bodyLines) {
      const headers = splitTableRow(headerLine);
      const rows = bodyLines.map(splitTableRow);
      const columnCount = headers.length;

      const renderCell = (cell, tag) => `<${tag}>${inlineMarkdown(cell || "")}</${tag}>`;
      const normalize = (row) => Array.from({ length: columnCount }, (_, index) => row[index] || "");

      return [
        '<div class="table-wrap"><table>',
        "<thead><tr>",
        normalize(headers).map((cell) => renderCell(cell, "th")).join(""),
        "</tr></thead>",
        "<tbody>",
        ...rows.map((row) => `<tr>${normalize(row).map((cell) => renderCell(cell, "td")).join("")}</tr>`),
        "</tbody>",
        "</table></div>",
      ].join("");
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n?/g, "\n").split("\n");
      const html = [];
      const paragraph = [];
      let list = [];

      function flushList() {
        if (!list.length) return;
        html.push("<ul>");
        list.forEach((item) => html.push(`<li>${inlineMarkdown(item)}</li>`));
        html.push("</ul>");
        list = [];
      }

      for (let index = 0; index < lines.length; index += 1) {
        const rawLine = lines[index];
        const line = rawLine.trim();

        if (!line) {
          flushParagraph(paragraph, html);
          flushList();
          continue;
        }

        if (/^---+$/.test(line)) {
          flushParagraph(paragraph, html);
          flushList();
          html.push("<hr>");
          continue;
        }

        if (isTableRow(line) && isTableSeparator((lines[index + 1] || "").trim())) {
          flushParagraph(paragraph, html);
          flushList();
          const bodyLines = [];
          index += 2;
          while (index < lines.length && isTableRow(lines[index].trim())) {
            bodyLines.push(lines[index].trim());
            index += 1;
          }
          index -= 1;
          html.push(renderTable(line, bodyLines));
          continue;
        }

        const image = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
        if (image) {
          flushParagraph(paragraph, html);
          flushList();
          const alt = escapeAttribute(image[1]);
          const src = escapeAttribute(image[2]);
          html.push(`<figure><img src="${src}" alt="${alt}" loading="lazy"><figcaption>${alt}</figcaption></figure>`);
          continue;
        }

        const quote = line.match(/^>\s+(.+)$/);
        if (quote) {
          flushParagraph(paragraph, html);
          flushList();
          html.push(`<blockquote>${inlineMarkdown(quote[1])}</blockquote>`);
          continue;
        }

        const heading = line.match(/^(#{1,6})\s+(.+)$/);
        if (heading) {
          flushParagraph(paragraph, html);
          flushList();
          const level = Math.min(heading[1].length, 6);
          html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
          continue;
        }

        const item = line.match(/^[-*]\s+(.+)$/);
        if (item) {
          flushParagraph(paragraph, html);
          list.push(item[1]);
          continue;
        }

        flushList();
        paragraph.push(line);
      }

      flushParagraph(paragraph, html);
      flushList();
      return html.join("\n");
    }

    async function loadMarkdown() {
      content.innerHTML = "";

      try {
        const response = await fetch(markdownFile, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const markdown = await response.text();
        content.className = markdownFile.endsWith("cover.md") ? "cover" : "document";
        content.innerHTML = renderMarkdown(markdown);
      } catch (error) {
        content.innerHTML = `
          <div class="error">
            <strong>Không tải được file Markdown.</strong><br>
            Trang cần được mở qua server nội bộ để trình duyệt đọc được file <code>${escapeHtml(markdownFile)}</code>.
          </div>
        `;
      }
    }

    reloadButton.addEventListener("click", loadMarkdown);
    loadMarkdown();
  </script>
</body>
</html>
